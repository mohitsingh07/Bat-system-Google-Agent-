<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayne Corp | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #020617; 
            background-image: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.85)), 
                              url('https://wallpaperaccess.com/full/191717.jpg');
            background-size: cover;
            background-position: center;
        }
        .bat-card { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(250, 204, 21, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-4">
    <div class="bat-card p-10 rounded-3xl w-full max-w-md border-t-4 border-t-yellow-500">
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <svg class="w-12 h-12 text-yellow-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4-3.9-3.8 5.4-.8L12 2z"/></svg>
            </div>
            <h2 class="text-2xl font-black text-white uppercase tracking-widest">Identify Yourself</h2>
            <p class="text-slate-500 text-xs mt-2 uppercase tracking-tighter">Authorized Personnel Only</p>
            <div id="error-box" class="hidden mt-4 p-2 bg-red-900/30 border border-red-500 text-red-400 text-xs rounded-lg font-mono"></div>
        </div>
        
        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-widest">Username</label>
                <input type="text" name="username" required 
                    class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white focus:ring-1 focus:ring-yellow-500 outline-none transition-all placeholder-slate-600" 
                    placeholder="Enter ID">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-widest">Access Key</label>
                <input type="password" name="password" required 
                    class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white focus:ring-1 focus:ring-yellow-500 outline-none transition-all placeholder-slate-600" 
                    placeholder="••••••••">
            </div>
            <button type="submit" 
                class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-xl shadow-[0_0_15px_rgba(250,204,21,0.3)] transition-all active:scale-95 uppercase tracking-widest text-sm">
                Access System
            </button>
        </form>
        <p class="mt-8 text-center text-xs text-slate-500 uppercase tracking-widest">
            First time? <a href="/signup" class="text-yellow-500 font-bold hover:underline">Request Access</a>
        </p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.has('error')) {
            const box = document.getElementById('error-box');
            box.classList.remove('hidden');
            box.innerText = "ACCESS DENIED: " + params.get('error').replace(/_/g, ' ').toUpperCase();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Bat-Computer | AI Agent</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
    box-sizing: border-box;
}

html {
    font-size: 14px;
}

@media (min-width: 768px) {
    html {
        font-size: 16px;
    }
}

body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background-color: #020617;
    overflow: hidden;
}

/* Batman Background */
.batman-bg {
    background-image:
        linear-gradient(rgba(2, 6, 23, 0.92), rgba(2, 6, 23, 0.92)),
        url('https://wallpaperaccess.com/full/191717.jpg');
    background-size: cover;
    background-position: center;
    position: relative;
}

/* Scan Animation */
@keyframes scan-move {
    0% {
        top: 0%;
        opacity: 0;
    }
    50% {
        opacity: 0.5;
    }
    100% {
        top: 100%;
        opacity: 0;
    }
}

.batman-bg::after {
    content: "";
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(to right, transparent, #facc15, transparent);
    box-shadow: 0 0 15px #facc15;
    animation: scan-move 8s linear infinite;
    pointer-events: none;
    z-index: 50;
}

/* Chat bubbles */
.chat-bubble-user {
    background: #1e293b;
    color: #facc15;
    border: 1px solid #facc15;
    border-radius: 18px 18px 0 18px;
    padding: 12px 16px;
    box-shadow: 0 4px 15px rgba(250, 204, 21, 0.1);
}

.chat-bubble-ai {
    background: rgba(30, 41, 59, 0.5);
    color: #e2e8f0;
    border-radius: 18px 18px 18px 0;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    padding: 12px 16px;
}

.chat-bubble-user,
.chat-bubble-ai {
    max-width: 90%;
    word-wrap: break-word;
}

@media (min-width: 768px) {
    .chat-bubble-user,
    .chat-bubble-ai {
        max-width: 70%;
    }
}

/* Active Status */
.active-glow {
    width: 10px;
    height: 10px;
    background-color: #22c55e;
    border-radius: 50%;
    box-shadow: 0 0 8px #22c55e, 0 0 15px #22c55e;
    animation: pulse-glow 2s infinite;
}

@keyframes pulse-glow {
    0% {
        opacity: 0.5;
        transform: scale(1);
    }
    50% {
        opacity: 1;
        transform: scale(1.2);
    }
    100% {
        opacity: 0.5;
        transform: scale(1);
    }
}

#chat-window::-webkit-scrollbar {
    width: 4px;
}

#chat-window::-webkit-scrollbar-thumb {
    background: #334155;
    border-radius: 10px;
}

.active-chat {
    background-color: rgba(250, 204, 21, 0.1) !important;
    color: #facc15 !important;
    border-left: 4px solid #facc15;
}

.hidden {
    display: none !important;
}

.hud-text {
    font-family: monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #475569;
}
</style>
</head>

<body class="text-slate-200 flex flex-col md:flex-row h-screen">

<!-- MOBILE TOP BAR -->
<div class="md:hidden flex items-center justify-between bg-black border-b border-slate-800 p-4">
    <h1 class="text-yellow-500 font-bold tracking-widest text-sm">
        BAT-SYSTEM
    </h1>

    <button id="menu-btn" class="text-yellow-500 text-2xl">
        ☰
    </button>
</div>

<!-- SIDEBAR -->
<aside
    id="sidebar"
    class="fixed md:relative top-0 left-0 z-50 w-72 h-full bg-black border-r border-slate-800 flex flex-col shadow-2xl transform -translate-x-full md:translate-x-0 transition-transform duration-300"
>

    <!-- Sidebar Header -->
    <div class="p-6 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-6 h-6 text-yellow-500">
                <svg fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4-3.9-3.8 5.4-.8L12 2z"/>
                </svg>
            </div>

            <h1 class="text-lg font-bold tracking-tighter text-white">
                BAT-SYSTEM
            </h1>
        </div>

        <button
            id="close-sidebar"
            class="md:hidden text-slate-400 text-2xl"
        >
            ×
        </button>
    </div>

    <!-- UI Decor -->
    <div class="px-6 mb-2 flex justify-between hud-text">
        <span>Core: v4.2.0</span>
        <span class="text-yellow-600">Secure</span>
    </div>

    <!-- New Chat -->
    <button
        onclick="createNewChat()"
        class="mx-4 mb-6 flex items-center justify-center gap-2 bg-yellow-500 hover:bg-yellow-400 text-black py-3 rounded-xl transition-all font-bold uppercase text-xs tracking-widest shadow-[0_0_15px_rgba(250,204,21,0.2)]"
    >
        + New Intelligence Session
    </button>

    <!-- Chat List -->
    <div
        id="chat-list"
        class="flex-1 overflow-y-auto px-3 space-y-1"
    ></div>

    <!-- Profile -->
    <div class="p-4 bg-[#0a0a0a] border-t border-slate-800 m-2 rounded-xl flex items-center gap-3 relative overflow-hidden">

        <div
            class="absolute inset-0 bg-yellow-500/5 opacity-10 pointer-events-none"
            style="animation: scan-move 3s linear infinite"
        ></div>

        <div class="relative">
            <div class="w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center border border-slate-700">
                <svg class="w-6 h-6 text-slate-500" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/>
                </svg>
            </div>

            <div class="absolute bottom-0 right-0 active-glow border-2 border-black"></div>
        </div>

        <div class="flex-1 min-w-0">
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">
                Operator
            </p>

            <p class="text-sm text-white font-bold truncate">
                __USERNAME__
            </p>
        </div>
    </div>
</aside>

<!-- OVERLAY -->
<div
    id="overlay"
    class="fixed inset-0 bg-black/60 z-40 hidden md:hidden"
></div>

<!-- MAIN -->
<main class="flex-1 flex flex-col batman-bg overflow-hidden relative h-screen">

    <!-- HEADER -->
    <header class="min-h-16 border-b border-slate-800 bg-black/60 backdrop-blur-md flex flex-col md:flex-row items-start md:items-center justify-between px-4 md:px-8 py-3 md:py-0 shrink-0 z-10 gap-2">

        <h2
            id="current-title"
            class="font-bold text-yellow-500 uppercase tracking-widest text-xs"
        >
            Initializing Uplink...
        </h2>

        <div class="flex gap-6 font-mono text-[9px] text-slate-500">
            <div class="flex flex-col items-end">
                <span class="text-slate-600">SIGNAL</span>
                <span class="text-green-500">ENCRYPTED</span>
            </div>

            <div class="flex flex-col items-end">
                <span class="text-slate-600">LATENCY</span>
                <span>14ms</span>
            </div>
        </div>
    </header>

    <!-- CHAT -->
    <div
        id="chat-window"
        class="flex-1 overflow-y-auto p-4 md:p-8 space-y-4 md:space-y-6 flex flex-col z-10"
    >

        <div
            id="empty-state"
            class="flex flex-col items-center justify-center h-full text-slate-500 opacity-40"
        >

            <div class="w-16 h-16 mb-4 border-2 border-slate-800 rounded-full flex items-center justify-center">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4-3.9-3.8 5.4-.8L12 2z"/>
                </svg>
            </div>

            <p class="font-mono text-[10px] uppercase tracking-[0.3em]">
                Encrypted Session Required
            </p>
        </div>
    </div>

    <!-- INPUT -->
    <div class="p-4 md:p-6 bg-black/80 border-t border-slate-800 shrink-0 z-10">

        <div class="max-w-4xl mx-auto flex flex-col sm:flex-row gap-3 relative">

            <input
                type="text"
                id="user-input"
                class="w-full p-3 md:p-4 bg-slate-900/40 border border-slate-800 rounded-2xl focus:ring-1 focus:ring-yellow-500 focus:bg-slate-900 focus:border-yellow-500/50 outline-none transition-all text-slate-200 placeholder-slate-700 font-mono text-sm"
                placeholder="Enter command for the Bat-Computer..."
                autocomplete="off"
            />

            <button
                id="send-btn"
                class="bg-yellow-500 text-black px-6 md:px-8 py-3 rounded-2xl w-full sm:w-auto hover:bg-yellow-400 transition-all flex items-center justify-center shadow-[0_0_20px_rgba(250,204,21,0.2)] font-black text-xs tracking-tighter"
            >
                EXECUTE
            </button>
        </div>
    </div>
</main>

<script>
let currentChatId = null;
let socket = null;
const username = "__USERNAME__";

/* MOBILE MENU */
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const menuBtn = document.getElementById('menu-btn');
const closeSidebar = document.getElementById('close-sidebar');

menuBtn.addEventListener('click', () => {
    sidebar.classList.remove('-translate-x-full');
    overlay.classList.remove('hidden');
});

closeSidebar.addEventListener('click', closeMenu);
overlay.addEventListener('click', closeMenu);

function closeMenu() {
    sidebar.classList.add('-translate-x-full');
    overlay.classList.add('hidden');
}

document.addEventListener('DOMContentLoaded', async () => {

    await loadChats();

    if (!currentChatId) {
        createNewChat();
    }

    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');

    btn.addEventListener('click', sendMessage);

    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
});

async function loadChats() {
    try {
        const res = await fetch('/get-chats');
        const chats = await res.json();

        const list = document.getElementById('chat-list');
        list.innerHTML = '';

        chats.forEach(chat => {

            const div = document.createElement('div');

            div.className =
                `group flex justify-between items-center p-3 rounded-lg cursor-pointer transition-all hover:bg-slate-800/40 ${
                    currentChatId === chat.chat_id ? 'active-chat' : ''
                }`;

            div.onclick = () => selectChat(chat.chat_id, chat.title);

            div.innerHTML = `
                <span class="truncate text-[11px] font-mono uppercase tracking-tight flex-1">
                    ${chat.title}
                </span>

                <button
                    onclick="event.stopPropagation(); deleteChat('${chat.chat_id}')"
                    class="opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-500 ml-2 transition-opacity"
                >
                    ×
                </button>
            `;

            list.appendChild(div);
        });

    } catch (e) {
        console.error(e);
    }
}

async function createNewChat() {

    const res = await fetch('/create-chat', {
        method: 'POST'
    });

    const data = await res.json();

    await loadChats();

    selectChat(data.chat_id, data.title);
}

async function deleteChat(id) {

    if (!confirm("Terminate this intelligence thread?")) return;

    await fetch(`/delete-chat/${id}`, {
        method: 'DELETE'
    });

    if (currentChatId === id) {
        currentChatId = null;
        location.reload();
    } else {
        loadChats();
    }
}

async function selectChat(id, title) {

    currentChatId = id;

    document.getElementById('current-title').innerText =
        "LINK ESTABLISHED // SESSION: " + title.toUpperCase();

    document.getElementById('empty-state').classList.add('hidden');

    const windowDiv = document.getElementById('chat-window');

    windowDiv.innerHTML =
        '<p class="text-center text-yellow-500 font-mono text-[10px] animate-pulse tracking-widest">DECRYPTING ARCHIVES...</p>';

    const res = await fetch(`/get-messages/${id}`);

    const messages = await res.json();

    windowDiv.innerHTML = '';

    messages.forEach(msg => {
        appendMessage(msg.role, msg.content);
    });

    loadChats();

    setupWebSocket(id);

    closeMenu();

    setTimeout(() => {
        document.getElementById('user-input').focus();
    }, 100);
}

function setupWebSocket(chatId) {

    if (socket) socket.close();

    const protocol =
        window.location.protocol === 'https:' ? 'wss' : 'ws';

    socket = new WebSocket(
        `${protocol}://${window.location.host}/ws/${username}/${chatId}`
    );

    socket.onmessage = (event) => {

        const data = JSON.parse(event.data);

        if (data.type === 'start') {

            appendMessage('assistant', '', true);

        } else if (data.type === 'chunk') {

            const streaming = document.getElementById('streaming-msg');

            if (streaming) {
                streaming.innerText += data.content;

                const win = document.getElementById('chat-window');
                win.scrollTop = win.scrollHeight;
            }

        } else if (data.type === 'done') {

            const streaming = document.getElementById('streaming-msg');

            if (streaming) {
                streaming.id = '';
            }
        }
    };
}

function appendMessage(role, content, isStreaming = false) {

    const windowDiv = document.getElementById('chat-window');

    const wrapper = document.createElement('div');

    wrapper.className =
        `flex w-full ${
            role === 'user' ? 'justify-end' : 'justify-start'
        }`;

    const bubble = document.createElement('div');

    bubble.className =
        role === 'user'
            ? 'chat-bubble-user'
            : 'chat-bubble-ai';

    if (isStreaming) {
        bubble.id = 'streaming-msg';
    }

    bubble.innerText = content;

    wrapper.appendChild(bubble);

    windowDiv.appendChild(wrapper);

    windowDiv.scrollTop = windowDiv.scrollHeight;
}

function sendMessage() {

    const input = document.getElementById('user-input');

    const text = input.value.trim();

    if (!text || !currentChatId) return;

    if (!socket || socket.readyState !== WebSocket.OPEN) {

        console.warn("Link down. Attempting reconnect...");

        setupWebSocket(currentChatId);

        return;
    }

    appendMessage('user', text);

    socket.send(text);

    input.value = '';
}
</script>

</body>
</html>

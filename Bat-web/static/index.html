<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bat-Computer | AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; height: 100vh; margin: 0; display: flex; overflow: hidden; background-color: #020617; }
        
        /* Batman Background */
        .batman-bg {
            background-image: linear-gradient(rgba(2, 6, 23, 0.92), rgba(2, 6, 23, 0.92)), 
                              url('https://wallpaperaccess.com/full/191717.jpg'); 
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* NEW: The Scanning Line Animation */
        @keyframes scan-move {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 0.5; }
            100% { top: 100%; opacity: 0; }
        }

        .batman-bg::after {
            content: "";
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, #facc15, transparent);
            box-shadow: 0 0 15px #facc15;
            animation: scan-move 8s linear infinite;
            pointer-events: none;
            z-index: 50;
        }

        /* Bat-styled Bubbles */
        .chat-bubble-user { background: #1e293b; color: #facc15; border: 1px solid #facc15; border-radius: 18px 18px 0 18px; padding: 12px 16px; box-shadow: 0 4px 15px rgba(250, 204, 21, 0.1); }
        .chat-bubble-ai { background: rgba(30, 41, 59, 0.5); color: #e2e8f0; border-radius: 18px 18px 18px 0; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px); padding: 12px 16px; }
        
        /* Active Status Glow */
        .active-glow {
            width: 10px;
            height: 10px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e, 0 0 15px #22c55e;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.5; transform: scale(1); }
        }

        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .active-chat { background-color: rgba(250, 204, 21, 0.1) !important; color: #facc15 !important; border-left: 4px solid #facc15; }
        
        .hidden { display: none !important; }

        /* HUD Decoration */
        .hud-text { font-family: monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #475569; }
    </style>
</head>
<body class="text-slate-200">

    <!-- Sidebar -->
    <aside class="w-72 bg-black border-r border-slate-800 flex flex-col shadow-2xl shrink-0">
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 text-yellow-500">
                    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4-3.9-3.8 5.4-.8L12 2z"/></svg>
                </div>
                <h1 class="text-lg font-bold tracking-tighter text-white">BAT-SYSTEM</h1>
            </div>
            <a href="/logout" class="text-slate-500 hover:text-yellow-400 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </a>
        </div>
        
        <!-- UI Decor -->
        <div class="px-6 mb-2 flex justify-between hud-text">
            <span>Core: v4.2.0</span>
            <span class="text-yellow-600">Secure</span>
        </div>

        <button onclick="createNewChat()" class="mx-4 mb-6 flex items-center justify-center gap-2 bg-yellow-500 hover:bg-yellow-400 text-black py-3 rounded-xl transition-all font-bold uppercase text-xs tracking-widest shadow-[0_0_15px_rgba(250,204,21,0.2)]">
            <span>+ New Intelligence Session</span>
        </button>

        <div id="chat-list" class="flex-1 overflow-y-auto px-3 space-y-1"></div>

        <!-- Profile Section -->
        <div class="p-4 bg-[#0a0a0a] border-t border-slate-800 m-2 rounded-xl flex items-center gap-3 relative overflow-hidden">
            <!-- Mini-scan effect on profile -->
            <div class="absolute inset-0 bg-yellow-500/5 opacity-10 pointer-events-none" style="animation: scan-move 3s linear infinite"></div>
            
            <div class="relative">
                <div class="w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center border border-slate-700">
                    <svg class="w-6 h-6 text-slate-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
                </div>
                <div class="absolute bottom-0 right-0 active-glow border-2 border-black"></div>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Operator</p>
                <p class="text-sm text-white font-bold truncate">__USERNAME__</p>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col batman-bg overflow-hidden relative">
        <header class="h-16 border-b border-slate-800 bg-black/60 backdrop-blur-md flex items-center justify-between px-8 shrink-0 z-10">
            <h2 id="current-title" class="font-bold text-yellow-500 uppercase tracking-widest text-xs">Initializing Uplink...</h2>
            
            <!-- Tech Details in Header -->
            <div class="flex gap-6 font-mono text-[9px] text-slate-500">
                <div class="flex flex-col items-end">
                    <span class="text-slate-600">SIGNAL</span>
                    <span class="text-green-500">ENCRYPTED</span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-slate-600">LATENCY</span>
                    <span>14ms</span>
                </div>
            </div>
        </header>

        <!-- Message Window -->
        <div id="chat-window" class="flex-1 overflow-y-auto p-8 space-y-6 flex flex-col z-10" onclick="document.getElementById('user-input').focus()">
            <div id="empty-state" class="flex flex-col items-center justify-center h-full text-slate-500 opacity-40">
                <div class="w-16 h-16 mb-4 border-2 border-slate-800 rounded-full flex items-center justify-center">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4-3.9-3.8 5.4-.8L12 2z"/></svg>
                </div>
                <p class="font-mono text-[10px] uppercase tracking-[0.3em]">Encrypted Session Required</p>
            </div>
        </div>

        <!-- Input Section -->
        <div class="p-6 bg-black/80 border-t border-slate-800 shrink-0 z-10">
            <div class="max-w-4xl mx-auto flex gap-3 relative">
                <input type="text" id="user-input" 
                    class="w-full p-4 bg-slate-900/40 border border-slate-800 rounded-2xl focus:ring-1 focus:ring-yellow-500 focus:bg-slate-900 focus:border-yellow-500/50 outline-none transition-all text-slate-200 placeholder-slate-700 font-mono text-sm"
                    placeholder="Enter command for the Bat-Computer..." 
                    autocomplete="off">
                <button id="send-btn" class="bg-yellow-500 text-black px-8 rounded-2xl hover:bg-yellow-400 transition-all flex items-center justify-center shadow-[0_0_20px_rgba(250,204,21,0.2)] font-black text-xs tracking-tighter">
                    EXECUTE
                </button>
            </div>
        </div>
    </main>

    <script>
        let currentChatId = null;
        let socket = null;
        const username = "__USERNAME__";

        document.addEventListener('DOMContentLoaded', async () => {
            // Initial load of chats
            await loadChats();
            
            // LOGIC: Auto-start session if none selected
            if (!currentChatId) {
                console.log("No active session detected. Initializing new uplink...");
                createNewChat();
            }

            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            btn.addEventListener('click', sendMessage);
            input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        });

        async function loadChats() {
            try {
                const res = await fetch('/get-chats');
                const chats = await res.json();
                const list = document.getElementById('chat-list');
                list.innerHTML = '';
                
                chats.forEach(chat => {
                    const div = document.createElement('div');
                    div.className = `group flex justify-between items-center p-3 rounded-lg cursor-pointer transition-all hover:bg-slate-800/40 ${currentChatId === chat.chat_id ? 'active-chat' : ''}`;
                    div.onclick = () => selectChat(chat.chat_id, chat.title);
                    div.innerHTML = `
                        <span class="truncate text-[11px] font-mono uppercase tracking-tight flex-1">${chat.title}</span>
                        <button onclick="event.stopPropagation(); deleteChat('${chat.chat_id}')" class="opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-500 ml-2 transition-opacity">×</button>
                    `;
                    list.appendChild(div);
                });
            } catch (e) { console.error("Communication error:", e); }
        }

        async function createNewChat() {
            const res = await fetch('/create-chat', { method: 'POST' });
            const data = await res.json();
            await loadChats();
            selectChat(data.chat_id, data.title);
        }

        async function deleteChat(id) {
            if(!confirm("Terminate this intelligence thread?")) return;
            await fetch(`/delete-chat/${id}`, { method: 'DELETE' });
            if(currentChatId === id) {
                currentChatId = null;
                location.reload(); // Reload will trigger the auto-start logic again
            } else {
                loadChats();
            }
        }

        async function selectChat(id, title) {
            currentChatId = id;
            document.getElementById('current-title').innerText = "LINK ESTABLISHED // SESSION: " + title.toUpperCase();
            document.getElementById('empty-state').classList.add('hidden');
            
            const windowDiv = document.getElementById('chat-window');
            windowDiv.innerHTML = '<p class="text-center text-yellow-500 font-mono text-[10px] animate-pulse tracking-widest">DECRYPTING ARCHIVES...</p>';
            
            const res = await fetch(`/get-messages/${id}`);
            const messages = await res.json();
            windowDiv.innerHTML = '';
            messages.forEach(msg => appendMessage(msg.role, msg.content));
            
            loadChats();
            setupWebSocket(id);
            setTimeout(() => document.getElementById('user-input').focus(), 100);
        }

        function setupWebSocket(chatId) {
            if (socket) socket.close();
            const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
            socket = new WebSocket(`${protocol}://${window.location.host}/ws/${username}/${chatId}`);
            
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'start') {
                    appendMessage('assistant', '', true);
                } else if (data.type === 'chunk') {
                    const streaming = document.getElementById('streaming-msg');
                    if (streaming) {
                        streaming.innerText += data.content;
                        const win = document.getElementById('chat-window');
                        win.scrollTop = win.scrollHeight;
                    }
                } else if (data.type === 'done') {
                    const streaming = document.getElementById('streaming-msg');
                    if (streaming) streaming.id = ''; 
                }
            };
        }

        function appendMessage(role, content, isStreaming = false) {
            const windowDiv = document.getElementById('chat-window');
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = role === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai';
            if (isStreaming) bubble.id = 'streaming-msg';
            bubble.innerText = content;
            
            wrapper.appendChild(bubble);
            windowDiv.appendChild(wrapper);
            windowDiv.scrollTop = windowDiv.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text || !currentChatId) return;
            
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                console.warn("Link down. Attempting to re-establish...");
                setupWebSocket(currentChatId);
                return;
            }
            
            appendMessage('user', text);
            socket.send(text);
            input.value = '';
        }
    </script>
</body>
</html>

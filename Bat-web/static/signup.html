<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayne Corp | Credentials Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #020617; 
            background-image: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.85)), 
                              url('https://wallpaperaccess.com/full/191717.jpg');
            background-size: cover;
            background-position: center;
        }
        .bat-card { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(250, 204, 21, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-4">
    <div class="bat-card p-10 rounded-3xl w-full max-w-md border-t-4 border-t-yellow-500 shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-black text-white uppercase tracking-widest">New Intelligence Link</h2>
            <p class="text-slate-500 text-xs mt-2 uppercase tracking-tighter">Initialize your encrypted profile</p>
        </div>

        <form action="/signup" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-widest">Full Name</label>
                <input type="text" name="full_name" required 
                    class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white focus:ring-1 focus:ring-yellow-500 outline-none transition-all placeholder-slate-600" 
                    placeholder="e.g. Bruce Wayne">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-widest">Username</label>
                <input type="text" name="username" required 
                    class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white focus:ring-1 focus:ring-yellow-500 outline-none transition-all placeholder-slate-600" 
                    placeholder="e.g. DarkKnight99">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-widest">Secure Access Key</label>
                <input type="password" name="password" required 
                    class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white focus:ring-1 focus:ring-yellow-500 outline-none transition-all placeholder-slate-600" 
                    placeholder="••••••••">
            </div>
            <button type="submit" 
                class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-xl shadow-[0_0_15px_rgba(250,204,21,0.3)] transition-all active:scale-95 uppercase tracking-widest text-sm">
                Create Credentials
            </button>
        </form>
        <p class="mt-6 text-center text-xs text-slate-500 uppercase tracking-widest">
            Already registered? <a href="/login" class="text-yellow-500 font-bold hover:underline">Log In</a>
        </p>
    </div>
</body>
</html>
